name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/spec/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build docs
        run: |
          cd docs
          # Build without semtex (not available in CI) — pandoc-only
          DOCS_DIR="$(pwd)"
          SITE_DIR="$DOCS_DIR/site"
          CONTENT_DIR="$DOCS_DIR/content"
          TEMPLATE="$DOCS_DIR/templates/default.html"
          THEME_FILE="$DOCS_DIR/css/themes/catppuccin.css"

          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR/foundations" "$SITE_DIR/css"

          cp "$DOCS_DIR/css/style.css" "$SITE_DIR/css/"
          cp "$THEME_FILE" "$SITE_DIR/css/theme.css"

          # Create empty mathjax_config.js (semtex not in CI)
          touch "$SITE_DIR/mathjax_config.js"

          build_page() {
            local src="$1" dst="$2" root="${3:-}"
            pandoc "$src" \
              --template="$TEMPLATE" \
              --from=markdown+tex_math_dollars+yaml_metadata_block \
              --to=html5 \
              --mathjax \
              --variable="root:$root" \
              --standalone \
              --output="$dst"
          }

          build_page "$CONTENT_DIR/index.md" "$SITE_DIR/index.html" ""
          build_page "$CONTENT_DIR/getting-started.md" "$SITE_DIR/getting-started.html" ""

          for f in "$CONTENT_DIR/foundations/"*.md; do
            name="$(basename "$f" .md)"
            build_page "$f" "$SITE_DIR/foundations/$name.html" "../"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
